<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ Đồ Linh Kiện Xe Tương Tác | J2Car</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Theme Variables - Dark Mode by default */
            --bg-page: #0f172a;
            --bg-panel: #1e293b;
            --bg-canvas: #0b0f19;
            --border-line: #334155;
            --text-title: #f8fafc;
            --text-body: #cbd5e1;
            --text-light: #94a3b8;
            --primary: #f97316;
            --primary-hover: #ea580c;
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            /* Theme Variables - Light Mode */
            --bg-page: #f8fafc;
            --bg-panel: #ffffff;
            --bg-canvas: #ffffff;
            --border-line: #e2e8f0;
            --text-title: #0f172a;
            --text-body: #475569;
            --text-light: #64748b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.01);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-body);
            transition: var(--transition);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left .subtitle {
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .header-left .subtitle::after {
            content: "";
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: var(--primary);
        }

        .header-left h1 {
            font-size: 32px;
            font-weight: 900;
            color: var(--text-title);
            text-transform: uppercase;
            letter-spacing: -0.025em;
        }

        .header-left p {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* Actions */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-toggle {
            background: var(--bg-panel);
            border: 1px solid var(--border-line);
            color: var(--text-title);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--card-shadow);
        }

        .btn-toggle:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .btn-back {
            background-color: var(--primary);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 4px;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(249, 115, 22, 0.3);
        }

        .btn-back:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* Tabs Section */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border-line);
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .tab-btn {
            background: none;
            border: none;
            outline: none;
            padding: 15px 25px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-light);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-btn.active::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--primary);
        }

        /* Layout Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Canvas Panel (Left) */
        .canvas-panel {
            background-color: var(--bg-canvas);
            border: 1px solid var(--border-line);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--card-shadow);
        }

        .canvas-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .canvas-instructions {
            color: var(--text-light);
        }

        .canvas-legend {
            display: flex;
            gap: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-dot.in-stock {
            background-color: var(--success);
        }

        .legend-dot.low-stock {
            background-color: var(--danger);
        }

        /* SVG container */
        .svg-container {
            width: 100%;
            max-width: 700px;
            aspect-ratio: 4/3;
            background: rgba(15, 23, 42, 0.03);
            border: 1px dashed rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 10px;
        }

        [data-theme="dark"] .svg-container {
            background: rgba(0, 0, 0, 0.2);
        }

        .svg-container svg {
            width: 100%;
            height: 100%;
            user-select: none;
        }

        /* Details Panel (Right) */
        .details-panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-line);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--card-shadow);
            height: 100%;
            min-height: 520px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-line);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .panel-header .title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-light);
        }

        .status-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid transparent;
        }

        .status-badge.in-stock {
            background-color: var(--success-bg);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .status-badge.low-stock {
            background-color: var(--danger-bg);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .part-info h2 {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-title);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .part-info .desc {
            font-size: 13px;
            color: var(--text-body);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .brand-section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-light);
            margin-bottom: 12px;
            display: block;
        }

        .brand-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .brand-card {
            background: rgba(15, 23, 42, 0.02);
            border: 1px solid var(--border-line);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        [data-theme="dark"] .brand-card {
            background: rgba(0, 0, 0, 0.15);
        }

        .brand-card:hover {
            border-color: var(--primary);
        }

        .brand-details h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-title);
        }

        .brand-details p {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 2px;
        }

        .brand-price {
            text-align: right;
        }

        .price-num {
            font-size: 15px;
            font-weight: 900;
            color: var(--primary);
        }

        .btn-buy {
            background: none;
            border: 1px solid rgba(249, 115, 22, 0.3);
            color: var(--primary);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 6px;
            display: inline-block;
            transition: var(--transition);
        }

        .btn-buy:hover {
            background-color: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        /* SVG styles & interactive hotspots */
        .hotspot-group {
            cursor: pointer;
        }

        .hotspot-selection {
            fill: none;
            stroke: var(--primary);
            stroke-width: 2;
            stroke-dasharray: 3, 3;
            opacity: 0;
            transition: var(--transition);
        }

        .hotspot-group.active .hotspot-selection {
            opacity: 1;
        }

        .glow-ring {
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
            transform-origin: center;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.7);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.4);
                opacity: 0.15;
            }
            100% {
                transform: scale(0.7);
                opacity: 0.7;
            }
        }

        /* Toast feedback */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--success);
            color: white;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 16px 28px;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: var(--transition);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Info footnote */
        .footnote {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: auto;
            border-top: 1px solid var(--border-line);
            padding-top: 15px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>

                <div class="svg-container" id="svg-render-area">

                </div>
            </div>

            <!-- Right: Info Panel -->
            <div class="details-panel" id="details-box">
                <!-- Content injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->

        // Render functions
        function renderSVG() {
            const container = document.getElementById('svg-render-area');
            container.innerHTML = SVGTemplates[activeTab];

            // Render Hotspots overlay inside SVG
            const hotspotsContainer = container.querySelector('#hotspots-container');
            const currentPartsList = data[activeTab];

            let hotspotsHTML = '';
            currentPartsList.forEach(part => {
                const color = part.status === 'low-stock' ? 'var(--danger)' : 'var(--success)';
                hotspotsHTML += `
                    <g class="hotspot-dot" data-id="${part.id}" style="cursor: pointer;">
                        <!-- Selection outer dashed ring (only shown when selected) -->
                        <circle class="select-ring" cx="${part.hotspot.x}" cy="${part.hotspot.y}" r="18" fill="none" stroke="var(--primary)" stroke-width="2" stroke-dasharray="3,3" style="opacity: ${selectedPartId === part.id ? 1 : 0}; transition: var(--transition);" />
                        
                        <!-- Pulsing glow ring -->
                        <circle class="glow-ring" cx="${part.hotspot.x}" cy="${part.hotspot.y}" r="12" fill="${color}" opacity="0.4"></circle>
                        
                        <!-- Solid inner dot -->
                        <circle cx="${part.hotspot.x}" cy="${part.hotspot.y}" r="6" fill="${color}" stroke="#ffffff" stroke-width="1.5" />
                    </g>
                `;
            });
            hotspotsContainer.innerHTML = hotspotsHTML;

            // Bind click events on SVG groups
            const groups = container.querySelectorAll('.hotspot-group');
            groups.forEach(group => {
                const id = group.getAttribute('data-id');
                if (id === selectedPartId) {
                    group.classList.add('active');
                }
                group.addEventListener('click', () => selectPart(id));
            });

            // Bind click events on overlay dot groups
            const dots = container.querySelectorAll('.hotspot-dot');
            dots.forEach(dot => {
                const id = dot.getAttribute('data-id');
                dot.addEventListener('click', () => selectPart(id));
            });
        }

        function selectPart(id) {
            selectedPartId = id;
            
            // Update active states in SVG
            const container = document.getElementById('svg-render-area');
            
            container.querySelectorAll('.hotspot-group').forEach(g => {
                if (g.getAttribute('data-id') === id) {
                    g.classList.add('active');
                } else {
                    g.classList.remove('active');
                }
            });

            container.querySelectorAll('.hotspot-dot').forEach(dot => {
                const selectRing = dot.querySelector('.select-ring');
                if (dot.getAttribute('data-id') === id) {
                    selectRing.style.opacity = 1;
                } else {
                    selectRing.style.opacity = 0;
                }
            });

            renderDetails();
        }

        function renderDetails() {
            const detailsBox = document.getElementById('details-box');
            const currentPartsList = data[activeTab];
            const partObj = currentPartsList.find(p => p.id === selectedPartId) || currentPartsList[0];

            let brandsHTML = '';
            partObj.brands.forEach(brand => {
                brandsHTML += `
                    <div class="brand-card">
                        <div class="brand-details">
                            <h4>${brand.name}</h4>
                            <p>Tồn kho: ${brand.stock} chiếc</p>
                        </div>
                        <div class="brand-price">
                            <div class="price-num">${brand.price.toLocaleString('vi-VN')}₫</div>
                            <button class="btn-buy" onclick="triggerAddToCart('${partObj.name} - ${brand.name}')">Thêm vào giỏ</button>
                        </div>
                    </div>
                `;
            });

            detailsBox.innerHTML = `
                <div class="panel-header">
                    <span class="title">Thông tin linh kiện</span>
                    <span class="status-badge ${partObj.status === 'low-stock' ? 'low-stock' : 'in-stock'}">
                        ${partObj.statusText}
                    </span>
                </div>

                <div class="part-info">
                    <h2>${partObj.name}</h2>
                    <p class="desc">${partObj.desc}</p>
                    
                    <span class="brand-section-title">Thương hiệu phân phối</span>
                    <div class="brand-list">
                        ${brandsHTML}
                    </div>
                </div>

                <div class="footnote">
                    <!-- Info Icon -->
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                    <span>Dữ liệu tồn kho đồng bộ thời gian thực từ J2Car</span>
                </div>
            `;
        }

        // Add to Cart toast mock feedback
        function triggerAddToCart(name) {
            const toast = document.getElementById('cart-toast');
            toast.textContent = `Đã thêm ${name} vào giỏ hàng!`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Tab selection change
        const tabButtons = document.querySelectorAll('.tab-btn');
        tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                tabButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                activeTab = btn.getAttribute('data-tab');
                
                // Select default part for the selected tab
                if (activeTab === 'engine') selectedPartId = 'oil-filter';
                else if (activeTab === 'brake') selectedPartId = 'brake-rotor';
                else if (activeTab === 'suspension') selectedPartId = 'shock-absorber';

                renderSVG();
                renderDetails();
            });
        });

        // Initialize Page
        renderSVG();
        renderDetails();
    </script>
